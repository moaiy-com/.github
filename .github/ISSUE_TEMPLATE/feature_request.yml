name: Feature request
description: Suggest a product or developer experience improvement
title: "feat: "
labels:
  - enhancement
body:
  - type: input
    id: problem
    attributes:
      label: Problem statement
      description: What user/developer problem should this solve?
      placeholder: As a user, I want...
    validations:
      required: true
  - type: textarea
    id: proposal
    attributes:
      label: Proposed solution
      description: Describe your preferred solution
    validations:
      required: true
  - type: textarea
    id: alternatives
    attributes:
      label: Alternatives considered
  - type: textarea
    id: impact
    attributes:
      label: Impact
      description: Security, UX, compatibility, performance, etc.

name: Bug report
description: Report a reproducible problem
title: "bug: "
labels:
  - bug
body:
  - type: markdown
    attributes:
      value: |
        Thanks for filing a bug report.
        For security vulnerabilities, do not use this template. Use `SECURITY.md`.
  - type: input
    id: summary
    attributes:
      label: Summary
      description: One-line description of the issue
      placeholder: What is broken?
    validations:
      required: true
  - type: textarea
    id: steps
    attributes:
      label: Steps to reproduce
      description: Precise steps to reproduce the issue
      placeholder: |
        1. ...
        2. ...
        3. ...
    validations:
      required: true
  - type: textarea
    id: expected
    attributes:
      label: Expected behavior
    validations:
      required: true
  - type: textarea
    id: actual
    attributes:
      label: Actual behavior
    validations:
      required: true
  - type: input
    id: version
    attributes:
      label: Version / commit
      placeholder: v0.4.0 or commit SHA
  - type: textarea
    id: environment
    attributes:
      label: Environment
      description: OS, app version, runtime details
      placeholder: macOS version, device, etc.
